<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 260" preserveAspectRatio="none" role="img" aria-labelledby="title desc">
  <title id="title">Wide computer technology banner</title>
  <desc id="desc">A bright wide banner with computers, code panels, servers, and network lines.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#dff2ff"/>
      <stop offset=".52" stop-color="#a9d6ff"/>
      <stop offset="1" stop-color="#d8ffe9"/>
    </linearGradient>
    <linearGradient id="screen" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#3d8bfd"/>
      <stop offset="1" stop-color="#3ecf8e"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-30%" width="140%" height="170%">
      <feDropShadow dx="0" dy="14" stdDeviation="12" flood-color="#22517d" flood-opacity=".22"/>
    </filter>
  </defs>

  <rect width="1200" height="260" fill="url(#bg)"/>
  <circle cx="1020" cy="38" r="115" fill="#ffffff" opacity=".35"/>
  <circle cx="745" cy="234" r="130" fill="#ffffff" opacity=".25"/>
  <circle cx="270" cy="50" r="98" fill="#3d8bfd" opacity=".12"/>

