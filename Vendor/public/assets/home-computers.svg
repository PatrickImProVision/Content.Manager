  <path d="M104 72c125 64 222 58 352 18s260-54 420 8 238 70 308 28" fill="none" stroke="#3d8bfd" stroke-width="4" stroke-linecap="round" opacity=".25"/>

  <g filter="url(#shadow)">
    <rect x="430" y="44" width="330" height="154" rx="18" fill="#eef7ff" stroke="#ffffff" stroke-width="3"/>
    <rect x="452" y="66" width="286" height="96" rx="8" fill="#102136"/>
    <rect x="476" y="88" width="96" height="10" rx="5" fill="url(#screen)"/>
    <rect x="476" y="112" width="200" height="8" rx="4" fill="#8fc7ff"/>
    <rect x="476" y="132" width="166" height="8" rx="4" fill="#8ef5c1"/>
    <rect x="658" y="88" width="54" height="54" rx="8" fill="#3d8bfd" opacity=".45"/>
    <rect x="566" y="198" width="58" height="24" fill="#7fb2f0"/>
    <rect x="500" y="222" width="190" height="14" rx="7" fill="#d7e8ff"/>
  </g>

  <g filter="url(#shadow)">
    <rect x="810" y="86" width="210" height="94" rx="14" fill="#eef7ff" stroke="#ffffff" stroke-width="3"/>
    <rect x="828" y="106" width="174" height="44" rx="7" fill="#102136"/>
    <rect x="850" y="120" width="72" height="7" rx="4" fill="#3ecf8e"/>
    <rect x="850" y="136" width="118" height="6" rx="3" fill="#8fc7ff"/>
